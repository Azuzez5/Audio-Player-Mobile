<!DOCTYPE html>
<html lang="vi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Audio Player</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="bg-aurora"></div>
<div class="noise"></div>
<h1>🎧 Audio Player</h1>

<div class="topbar">
<button id="miniBtn">Mini</button>

<input type="file" id="upload" multiple accept="audio/*">
<input type="file" id="uploadFolder" webkitdirectory multiple>

<input id="search" placeholder="🔍 Search">
<button id="shuffleBtn">🔀</button>
<button id="repeatBtn">🔁</button>

</div>

<div id="dropZone">📂 Drag & Drop Audio Here</div>

<ul id="trackList"></ul>

<div id="player">

<img id="cover">

<div id="info">
<div id="title"></div>
<canvas id="wave"></canvas>
</div>

<div class="controls">

<button id="prev">⏮</button>
<button id="play">▷</button>
<button id="next">⏭</button>

</div>

<input type="range" id="progress" value="0">
<div id="time">0:00 / 0:00</div>

<input type="range" id="volume" min="0" max="1" step="0.01">
<span id="volumeText">100%</span>

</div>

<select id="speed">
<option value="0.75">0.75x</option>
<option value="1" selected>1x</option>
<option value="1.25">1.25x</option>
<option value="1.5">1.5x</option>
<option value="2">2x</option>
</select>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>
</body>

</html>
